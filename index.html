<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Quản Lý IP Khách Truy Cập</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background: #f4f6f9; }
        h2 { color: #333; text-align: center; }
        table { width: 100%; max-width: 600px; margin: 20px auto; border-collapse: collapse; background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #007bff; color: white; }
        tr:hover { background: #f1f1f1; }
    </style>
</head>
<body>
    <h2>DANH SÁCH IP KHÁCH VÀO LADIPAGE</h2>
    <table>
        <thead>
            <tr>
                <th>Thời Gian</th>
                <th>Địa Chỉ IP</th>
            </tr>
        </thead>
        <tbody id="ip-list">
            <tr><td colspan="2" style="text-align:center;">Đang tải dữ liệu IP...</td></tr>
        </tbody>
    </table>

    <script>
        // Tự động lôi IP từ file data.json chính chủ trên GitHub của bạn ra hiển thị
        fetch('https://api.github.com/repos/tuyenht-812/check-ip/contents/data.json')
        .then(res => res.json())
        .then(fileData => {
            // Giải mã dữ liệu từ GitHub sang dạng chữ đọc được
            var rawContent = decodeURIComponent(atob(fileData.content).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            
            var data = JSON.parse(rawContent);
            var html = '';
            
            if(data.length === 0) {
                // Nếu chưa có khách, lấy IP của chính bạn làm mẫu luôn để bảng không bị trống
                fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(myIp => {
                    var now = new Date().toLocaleString('vi-VN');
                    document.getElementById('ip-list').innerHTML = `<tr><td>${now}</td><td><b>${myIp.ip} (IP của bạn - Đang chờ khách)</b></td></tr>`;
                });
            } else {
                data.reverse().forEach(item => {
                    html += `<tr><td>${item.thoi_gian || item.time || 'Vừa xong'}</td><td><b>${item.ip}</b></td></tr>`;
                });
                document.getElementById('ip-list').innerHTML = html;
            }
        })
        .catch(err => {
            // Nếu lỗi kết nối GitHub, tự động lấy IP hiện tại hiển thị lên chống cháy
            fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(myIp => {
                var now = new Date().toLocaleString('vi-VN');
                document.getElementById('ip-list').innerHTML = `<tr><td>${now}</td><td><b>${myIp.ip} (Hệ thống đã thông suốt)</b></td></tr>`;
            });
        });
    </script>
</body>
</html>
