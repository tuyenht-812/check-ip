<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Quản Lý IP Khách Truy Cập</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background: #f4f6f9; }
        h2 { color: #333; text-align: center; }
        table { width: 100%; max-width: 600px; margin: 20px auto; border-collapse: collapse; background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #007bff; color: white; }
        tr:hover { background: #f1f1f1; }
    </style>
</head>
<body>
    <h2>DANH SÁCH IP KHÁCH VÀO LADIPAGE</h2>
    <table>
        <thead>
            <tr>
                <th>Thông Tin Truy Cập (Thời Gian | Địa Chỉ IP)</th>
            </tr>
        </thead>
        <tbody id="ip-list">
            <tr><td style="text-align:center;">Đang tải danh sách IP...</td></tr>
        </tbody>
    </table>

    <script>
        // Gọi lên kho lưu trữ đám mây để lấy danh sách IP về hiện lên màn hình
        fetch('https://api.counterapi.dev/v1/tuyenht812/ip_logs')
        .then(res => res.json())
        .then(response => {
            var html = '';
            // Kiểm tra nếu có dữ liệu IP
            if(response && response.value) {
                // Tách các IP được lưu thành từng dòng
                var logs = response.value.split('\n');
                logs.reverse().forEach(log => {
                    if(log.trim() !== "") {
                        html += `<tr><td><b>${log}</b></td></tr>`;
                    }
                });
            }
            if(html === '') {
                html = '<tr><td style="text-align:center;">Chưa có khách nào vào trang hoặc chưa bắt được IP.</td></tr>';
            }
            document.getElementById('ip-list').innerHTML = html;
        })
        .catch(err => {
            document.getElementById('ip-list').innerHTML = '<tr><td style="text-align:center; color:red;">Lỗi kết nối máy chủ dữ liệu!</td></tr>';
        });
    </script>
</body>
</html>
